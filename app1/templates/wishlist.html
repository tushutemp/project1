{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Wishlist ❤️</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f5f5;
    font-family: 'Montserrat', sans-serif;
}

/* Title */
.wishlist-title {
    text-align: center;
    margin: 30px 0;
    font-size: 32px;
    font-weight: bold;
    color: #333;
}

/* Grid */
.wishlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
}

/* Card */
.wishlist-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    text-align: center;
    position: relative;
}

.wishlist-card:hover {
    transform: translateY(-5px);
}

/* Image */
.wishlist-card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
}

/* Info */
.wishlist-info {
    padding: 15px;
}

.wishlist-info h5 {
    font-size: 18px;
    color: #333;
}

.wishlist-info p {
    color: #b12704;
    font-weight: bold;
}

/* Buttons */
.btn-view {
    background: #007185;
    color: white;
    border-radius: 20px;
    padding: 6px 15px;
    text-decoration: none;
    display: inline-block;
    margin-top: 5px;
}

.btn-view:hover {
    background: #004f5c;
}

/* Remove button */
.remove-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    border-radius: 50%;
    padding: 6px 10px;
    font-size: 16px;
    color: red;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    text-decoration: none;
}

.remove-btn:hover {
    background: #ffe6e6;
}

/* Empty */
.empty-box {
    text-align: center;
    margin-top: 100px;
    color: gray;
}
</style>
</head>

<body>

{% include 'header.html' %}

<div class="container">

<h2 class="wishlist-title">❤️ My Wishlist</h2>

{% if items %}

<div class="wishlist-grid">

{% for item in items %}
<div class="wishlist-card">

    <!-- ❌ Remove -->
   <a href="{% url 'remove_from_wishlist' item.product.id %}" class="remove-btn">
    ✖
</a>

    <!-- Image -->
    <img src="{{ item.product.image.url }}">

    <!-- Info -->
    <div class="wishlist-info">
        <h5>{{ item.product.name }}</h5>
        <p>₹{{ item.product.price }}</p>

        <a href="{% url 'product_detail' item.product.id %}" class="btn-view">
            View Product
        </a>
    </div>

</div>
{% endfor %}

</div>

{% else %}

<div class="empty-box">
    <h3>😢 Your wishlist is empty</h3>
    <p>Start adding products you love!</p>
    <a href="{% url 'shop' %}" class="btn btn-dark mt-3">Go Shopping</a>
</div>

{% endif %}

</div>

</body>
</html>
